	SPI
	Wire
platform_packages =
	tool-esptoolpy @ ~2.41100.0
	file://C:/Users/fabri/.platformio/tools/toolchain-xtensa-esp-elf

[env:controller_display]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
platform_packages =
	framework-arduinoespressif32 @ https://github.com/espressif/arduino-esp32/releases/download/3.3.7/esp32-core-3.3.7.tar.xz
board = ESP32-S3-Touch-LCD-7B
framework = arduino
board_build.flash_mode = qio
board_build.arduino.memory_type = qio_opi
board_build.sdkconfig = sdkconfig.display.defaults
custom_sdkconfig =
	CONFIG_IDF_EXPERIMENTAL_FEATURES=y
	CONFIG_SPIRAM=y
	CONFIG_SPIRAM_MODE_OCT=y
	CONFIG_SPIRAM_TYPE_AUTO=y
	CONFIG_SPIRAM_USE_MALLOC=y
	CONFIG_SPIRAM_MALLOC_ALWAYSINTERNAL=1024
	CONFIG_SPIRAM_MALLOC_RESERVE_INTERNAL=49152
	CONFIG_SPIRAM_TRY_ALLOCATE_WIFI_LWIP=y
	CONFIG_ESP32S3_DATA_CACHE_LINE_64B=y
	CONFIG_ESP32S3_DATA_CACHE_LINE_SIZE=64
	CONFIG_SPIRAM_XIP_FROM_PSRAM=y
	CONFIG_SPIRAM_FETCH_INSTRUCTIONS=y
	CONFIG_SPIRAM_RODATA=y
	CONFIG_LCD_RGB_ISR_IRAM_SAFE=y
	CONFIG_ESP_WIFI_STATIC_RX_BUFFER_NUM=2
	CONFIG_ESP_WIFI_DYNAMIC_RX_BUFFER_NUM=8
	CONFIG_ESP_WIFI_TX_BUFFER_TYPE=0
	CONFIG_ESP_WIFI_STATIC_TX_BUFFER_NUM=4
	CONFIG_ESP_WIFI_CACHE_TX_BUFFER_NUM=4
	CONFIG_ESP_WIFI_MGMT_SBUF_NUM=8
	CONFIG_ESP_WIFI_RX_MGMT_BUF_NUM_DEF=3
	CONFIG_ESP_WIFI_RX_BA_WIN=2
	CONFIG_ESP_WIFI_TX_BA_WIN=2
	CONFIG_ESP_WIFI_CSI_ENABLED=n
	CONFIG_MBEDTLS_EXTERNAL_MEM_ALLOC=y
	CONFIG_MBEDTLS_ASYMMETRIC_CONTENT_LEN=y
	CONFIG_MBEDTLS_SSL_IN_CONTENT_LEN=4096
	CONFIG_MBEDTLS_SSL_OUT_CONTENT_LEN=2048
custom_component_remove =
	espressif/esp-dsp
	espressif/network_provisioning
	espressif/esp-zboss-lib
	espressif/esp-zigbee-lib
	espressif/esp_rainmaker
	espressif/rmaker_common
	espressif/esp_insights
	espressif/esp_diag_data_store
	espressif/esp_diagnostics
	espressif/cbor
	espressif/qrcode
	espressif/esp-sr
	espressif/libsodium
	espressif/esp-modbus
	espressif/esp_modem
	espressif/mdns
	joltwallet/littlefs
	chmorgan/esp-libhelix-mp3
upload_speed = 921600
monitor_speed = 115200
board_build.partitions = partitions_display.csv
build_flags =
	-DDISABLE_ALL_LIBRARY_WARNINGS
	-DUSB_MODE=1
	-DARDUINO_USB_CDC_ON_BOOT=0
	-DCORE_DEBUG_LEVEL=1
	-DBOARD_HAS_PSRAM
	-D BOARD_PROFILE_DISPLAY
	-DLV_CONF_SKIP=1
	-DLV_FONT_MONTSERRAT_12=1
	-DLV_FONT_MONTSERRAT_16=1
	-DLV_FONT_MONTSERRAT_20=1
	-DLV_FONT_MONTSERRAT_24=1
	-DLV_FONT_MONTSERRAT_32=1
	-DLV_FONT_MONTSERRAT_48=1
	-I src
	-I "$PROJECT_PACKAGES_DIR/framework-arduinoespressif32/libraries/Network/src"
	-Wl,--wrap=log_printf
build_src_filter =
	+<main_display_controller.cpp>
	+<ui/ui_dc_splash.cpp>
	+<ui/ui_dc_home.cpp>
	+<ui/ui_dc_settings.cpp>
	+<ui/ui_filter_calib.cpp>
	+<ui/ui_dc_maintenance.cpp>
	+<ui/ui_dc_clock.cpp>
	+<ui/ui_dc_network.cpp>
	+<ui/ui_notifications.cpp>
	+<ui/icons/*.cpp>
	+<rs485_network.cpp>
	+<DisplayApi_Manager.cpp>
	+<certificates.cpp>
	+<DisplayLogoAsset.cpp>
	+<display_port/i2c.cpp>
	+<display_port/io_extension.cpp>
	+<display_port/rgb_lcd_port.cpp>
	+<display_port/touch.cpp>
	+<display_port/gt911.cpp>
	+<display_port/lvgl_port.cpp>
	+<log_printf_shim.c>
lib_deps =
	lvgl/lvgl @ ^8.4.0
lib_ignore =
	ArduinoOTA
	AsyncUDP
	BLE
	BluetoothSerial
	DNSServer
	EEPROM
	ESP_HostedOTA
	ESP_I2S
	ESP_NOW
	ESP_SR
	ESPmDNS
	FFat
	HTTPUpdate
	HTTPUpdateServer
	Insights
	LittleFS
	Matter
	NetBIOS
	OpenThread
	PPP
	RainMaker
	SD
	SD_MMC
	SimpleBLE
	SPIFFS
	TFLiteMicro
	Update
	USB
	WebServer
	WiFiProv
	Zigbee
lib_ldf_mode = deep+

