; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
src_dir = src
boards_dir = boards

[env]
platform = espressif32 @ ~5.3.0
board = esp32-c3-devkitm-1
framework = arduino
monitor_speed = 115200
lib_ldf_mode = deep+
board_build.flash_mode = dio
build_flags = 
	-D ARDUINO_USB_MODE=1
	-D ARDUINO_USB_CDC_ON_BOOT=1
	-D BOARD_FLASH_MODE_DIO

[env:controller_standalone_rewamping]
board_build.partitions = partitions_master.csv
build_flags =
	${env.build_flags}
	-D BOARD_PROFILE_CONTROLLER
build_src_filter =
	+<*>
	-<main_hello.cpp>
	-<main_diag_boot.cpp>
	-<main_pressure_peripheral.cpp>
	-<main_relay_peripheral.cpp>
	-<main_display_controller.cpp>
	-<main_display_vendor_baseline.cpp>
	-<DisplayBoard.cpp>
	-<DisplayLogoAsset.cpp>
	-<DisplayVendorFonts.cpp>
	-<ui/*>
	-<RS485_Slave.cpp>
	-<Serial_Peripheral.cpp>
	-<main_test.cpp>
	-<RelayTypes.cpp>
	-<RelayStorage.cpp>
	-<RelayController.cpp>
	-<RelaySerial.cpp>
	-<RelayRS485.cpp>
lib_deps = 
	SPI
	Wire
	adafruit/Adafruit SHTC3 Library @ ^1.0.1
	bluerobotics/BlueRobotics MS5837 Library @ ^1.1.1
platform_packages = 
	tool-esptoolpy @ ~2.41100.0
	file://C:/Users/fabri/.platformio/tools/toolchain-xtensa-esp-elf

[env:peripheral_pressure]
board_build.partitions = partitions.csv
build_flags =
	${env.build_flags}
	-D BOARD_PROFILE_PRESSURE
build_src_filter =
	+<main_pressure_peripheral.cpp>
	+<Led.cpp>
	+<Serial_Peripheral.cpp>
	+<RS485_Slave.cpp>
lib_deps = 
	SPI
	Wire
	adafruit/Adafruit SHTC3 Library @ ^1.0.1
	bluerobotics/BlueRobotics MS5837 Library @ ^1.1.1
platform_packages = 
	tool-esptoolpy @ ~2.41100.0
	file://C:/Users/fabri/.platformio/tools/toolchain-xtensa-esp-elf

[env:peripheral_pressure_recovery_uart]
extends = env:peripheral_pressure
build_unflags =
	-D ARDUINO_USB_MODE=1
	-D ARDUINO_USB_CDC_ON_BOOT=1
build_flags =
	${env.build_flags}
	-D BOARD_PROFILE_PRESSURE
	-D ARDUINO_USB_MODE=0
	-D ARDUINO_USB_CDC_ON_BOOT=0
platform_packages =
	tool-esptoolpy @ ~2.41100.0
	file://C:/Users/fabri/.platformio/tools/toolchain-xtensa-esp-elf

[env:peripheral_relay]
build_flags =
	${env.build_flags}
	-D BOARD_PROFILE_RELAY
build_src_filter =
	+<main_relay_peripheral.cpp>
	+<RelayTypes.cpp>
	+<RelayStorage.cpp>
	+<RelayController.cpp>
	+<RelaySerial.cpp>
	+<RelayRS485.cpp>
	+<Led.cpp>
lib_deps = 
	SPI
	Wire
platform_packages = 
	tool-esptoolpy @ ~2.41100.0
	file://C:/Users/fabri/.platformio/tools/toolchain-xtensa-esp-elf

