; File: platformio.ini
; Configurazione ambienti per EasyConnect Firmware 2026

[platformio]
src_dir = src

[env]
; Impostazioni comuni a tutte le schede
platform = espressif32
board = esp32-c3-devkitm-1
framework = arduino
monitor_speed = 115200
lib_ldf_mode = deep+
board_build.flash_mode = dio
build_flags =
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1
    -D BOARD_FLASH_MODE_DIO

; ============================================================
; 1) CONTROLLER STANDALONE / REWAMPING (ruolo RS485 master)
; ============================================================
[env:controller_standalone_rewamping]
board_build.partitions = partitions_master.csv
build_src_filter =
    +<*>
    -<main_hello.cpp>
    -<main_diag_boot.cpp>
    -<main_pressure_peripheral.cpp>
    -<main_relay_peripheral.cpp>
    -<main_motor_peripheral.cpp>
    -<main_display_controller.cpp>
    -<RS485_Slave.cpp>
    -<Serial_Peripheral.cpp>
    -<main_test.cpp>
    -<RelayTypes.cpp>
    -<RelayStorage.cpp>
    -<RelayController.cpp>
    -<RelaySerial.cpp>
    -<RelayRS485.cpp>
lib_deps =
    SPI
    Wire
    adafruit/Adafruit SHTC3 Library @ ^1.0.1
    bluerobotics/BlueRobotics MS5837 Library @ ^1.1.1

; ============================================================
; 2) PERIFERICA PRESSIONE (ruolo RS485 slave)
; ============================================================
[env:peripheral_pressure]
board_build.partitions = partitions.csv
build_src_filter =
    +<*>
    -<main_hello.cpp>
    -<main_diag_boot.cpp>
    -<main_standalone_rewamping_controller.cpp>
    -<main_relay_peripheral.cpp>
    -<main_motor_peripheral.cpp>
    -<main_display_controller.cpp>
    -<WebHandler.cpp>
    -<RS485_Master.cpp>
    -<Serial_Controller.cpp>
    -<Calibration.cpp>
    -<MembraneKeyboard.cpp>
    -<RelayTypes.cpp>
    -<RelayStorage.cpp>
    -<RelayController.cpp>
    -<RelaySerial.cpp>
    -<RelayRS485.cpp>
lib_deps =
    SPI
    Wire
    adafruit/Adafruit SHTC3 Library @ ^1.0.1
    bluerobotics/BlueRobotics MS5837 Library @ ^1.1.1

; ============================================================
; 3) PERIFERICA RELAY (ruolo RS485 slave)
; ============================================================
[env:peripheral_relay]
build_src_filter =
    +<main_relay_peripheral.cpp>
    +<RelayTypes.cpp>
    +<RelayStorage.cpp>
    +<RelayController.cpp>
    +<RelaySerial.cpp>
    +<RelayRS485.cpp>
    +<Led.cpp>
lib_deps =
    SPI
    Wire

; ============================================================
; 4) PERIFERICA MOTORE (placeholder)
; ============================================================
[env:peripheral_motor]
build_src_filter =
    +<main_motor_peripheral.cpp>
lib_deps =
    SPI
    Wire

; ============================================================
; 5) CONTROLLER DISPLAY (placeholder)
; ============================================================
[env:controller_display]
build_src_filter =
    +<main_display_controller.cpp>
lib_deps =
    SPI
    Wire

; ============================================================
; Recovery controller
; ============================================================
[env:controller_standalone_rewamping_recovery_uart]
extends = env:controller_standalone_rewamping
build_unflags =
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1
build_flags =
    ${env.build_flags}
    -D ARDUINO_USB_MODE=0
    -D ARDUINO_USB_CDC_ON_BOOT=0

[env:controller_standalone_rewamping_recovery_qio]
extends = env:controller_standalone_rewamping
board_build.flash_mode = qio

; ============================================================
; Alias legacy (compatibilita')
; ============================================================
[env:master_rewamping]
extends = env:controller_standalone_rewamping

[env:pressione]
extends = env:peripheral_pressure

[env:relay]
extends = env:peripheral_relay

[env:motore]
extends = env:peripheral_motor

[env:easyconnect]
extends = env:controller_display

[env:master_rewamping_recovery_uart]
extends = env:controller_standalone_rewamping_recovery_uart

[env:master_rewamping_recovery_qio]
extends = env:controller_standalone_rewamping_recovery_qio

; ============================================================
; Firmware diagnostici
; ============================================================
[env:diagnostic_hello]
platform = espressif32
board = esp32-c3-devkitm-1
framework = arduino
monitor_speed = 115200
board_build.flash_mode = dio
build_flags =
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1
build_src_filter =
    +<main_hello.cpp>

[env:diagnostic_hard]
platform = espressif32
board = esp32-c3-devkitm-1
framework = arduino
monitor_speed = 115200
upload_speed = 115200
board_build.flash_mode = dio
build_flags =
    -D ARDUINO_USB_MODE=0
    -D ARDUINO_USB_CDC_ON_BOOT=0
build_src_filter =
    +<main_diag_boot.cpp>
