	bluerobotics/BlueRobotics MS5837 Library @ ^1.1.1
platform_packages = 
	tool-esptoolpy @ ~2.41100.0
	file://C:/Users/fabri/.platformio/tools/toolchain-xtensa-esp-elf

[env:peripheral_pressure_recovery_uart]
extends = env:peripheral_pressure
build_unflags =
	-D ARDUINO_USB_MODE=1
	-D ARDUINO_USB_CDC_ON_BOOT=1
build_flags =
	${env.build_flags}
	-D BOARD_PROFILE_PRESSURE
	-D ARDUINO_USB_MODE=0
	-D ARDUINO_USB_CDC_ON_BOOT=0
platform_packages =
	tool-esptoolpy @ ~2.41100.0
	file://C:/Users/fabri/.platformio/tools/toolchain-xtensa-esp-elf

